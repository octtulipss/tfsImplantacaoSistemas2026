<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetVital - Agendamento</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Pet<b>Vital</b></h1>
        <p>Saúde e bem-estar para quem sempre está ao seu lado.</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">A Clínica</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>
    <main>
        <h2>Agende uma Consulta</h2>
        <p>Preencha os dados abaixo para agendarmos o melhor horário para o seu pet.</p>
        
        <form style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label for="tutor">Nome do Tutor:</label><br>
                <input type="text" id="tutor" name="tutor" style="width: 100%; padding: 10px;" required>
            </div>
            
            <div>
                <label for="pet">Nome e Espécie do Pet (Ex: Rex - Cachorro):</label><br>
                <input type="text" id="pet" name="pet" style="width: 100%; padding: 10px;" required>
            </div>

            <div>
                <label for="motivo">Motivo da Consulta / Sintomas:</label><br>
                <textarea id="motivo" name="motivo" rows="4" style="width: 100%; padding: 10px;"></textarea>
            </div>

            <button type="button" style="padding: 15px; background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer;">Enviar Solicitação</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 PetVital Assistência Veterinária | Projeto de Implantação de Sistemas</p>
    </footer>
</body>
</html>
